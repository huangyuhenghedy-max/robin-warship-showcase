<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <text x="640" y="38" text-anchor="middle" fill="#4a90d9" font-size="22" font-weight="bold" letter-spacing="3">BudgetDial 五档成本路由 & Dream Agent 四步自进化</text>
  <text x="640" y="58" text-anchor="middle" fill="#7f8c8d" font-size="12">Adaptive Cost Routing & Self-Evolution Pipeline</text>

  <!-- ── Left: BudgetDial ── -->
  <text x="100" y="95" fill="#4a90d9" font-size="16" font-weight="bold">BudgetDial 动态成本路由</text>
  <text x="100" y="112" fill="#7f8c8d" font-size="10">按任务难度自动选择最优性价比模型</text>

  <!-- Budget Tiers -->
  <rect x="80" y="130" width="520" height="35" rx="6" fill="#1b5e20" filter="url(#shadow)"/>
  <text x="160" y="152" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">eco</text>
  <rect x="200" y="133" width="390" height="29" rx="4" fill="#2e7d32"/>
  <text x="395" y="152" text-anchor="middle" fill="#a5d6a7" font-size="10">GLM-4-Flash / DeepSeek V4 Flash · 简单检索/分类/提取</text>

  <rect x="80" y="175" width="520" height="35" rx="6" fill="#33691e" filter="url(#shadow)"/>
  <text x="160" y="197" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">light</text>
  <rect x="200" y="178" width="390" height="29" rx="4" fill="#558b2f"/>
  <text x="395" y="197" text-anchor="middle" fill="#c5e1a5" font-size="10">GLM-4-Flash · 基础问答/代码生成/文档处理</text>

  <rect x="80" y="220" width="520" height="35" rx="6" fill="#e65100" filter="url(#shadow)"/>
  <text x="160" y="242" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">standard</text>
  <rect x="200" y="223" width="390" height="29" rx="4" fill="#ef6c00"/>
  <text x="395" y="242" text-anchor="middle" fill="#ffe0b2" font-size="10">GLM-5.2 · 复杂推理/多步决策/工具链调用</text>

  <rect x="80" y="265" width="520" height="35" rx="6" fill="#b71c1c" filter="url(#shadow)"/>
  <text x="160" y="287" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">premium</text>
  <rect x="200" y="268" width="390" height="29" rx="4" fill="#c62828"/>
  <text x="395" y="287" text-anchor="middle" fill="#ef9a9a" font-size="10">GPT-5.3 / Fable 5 · 高难度/创新性/安全敏感任务</text>

  <rect x="80" y="310" width="520" height="35" rx="6" fill="#4a148c" filter="url(#shadow)"/>
  <text x="160" y="332" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">max</text>
  <rect x="200" y="313" width="390" height="29" rx="4" fill="#6a1b9a"/>
  <text x="395" y="332" text-anchor="middle" fill="#ce93d8" font-size="10">最强可用模型 · 冠军争夺/核心判断/最终决策</text>

  <!-- Metrics -->
  <rect x="80" y="365" width="520" height="35" rx="6" fill="#0a1628" stroke="#2c3e50" stroke-width="1"/>
  <text x="340" y="388" text-anchor="middle" fill="#4a90d9" font-size="11">路由准确率 91.7% | 成本降低 40%+ | 80% 任务止于 eco/light</text>

  <!-- Usage distribution bar -->
  <rect x="80" y="410" width="260" height="22" rx="4" fill="#2e7d32"/>
  <text x="210" y="425" text-anchor="middle" fill="#fff" font-size="9">eco+light 80%</text>
  <rect x="340" y="410" width="130" height="22" rx="4" fill="#ef6c00"/>
  <text x="405" y="425" text-anchor="middle" fill="#fff" font-size="9">standard 15%</text>
  <rect x="470" y="410" width="130" height="22" rx="4" fill="#c62828"/>
  <text x="535" y="425" text-anchor="middle" fill="#fff" font-size="9">premium+max 5%</text>

  <text x="340" y="450" text-anchor="middle" fill="#7f8c8d" font-size="9">调用分布：80%轻量模型 + 15%标准模型 + 5%最强模型</text>

  <!-- ── Right: Dream Agent ── -->
  <text x="680" y="95" fill="#4a90d9" font-size="16" font-weight="bold">Dream Agent 四步自进化管线</text>
  <text x="680" y="112" fill="#7f8c8d" font-size="10">借鉴Letta sleep-time compute · 每次任务后自动进化</text>

  <!-- Step 1: Consolidate -->
  <rect x="680" y="145" width="240" height="70" rx="8" fill="#004d40" filter="url(#shadow)"/>
  <text x="740" y="170" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">① Consolidate</text>
  <text x="740" y="190" text-anchor="middle" fill="#80cbc4" font-size="9">聚合执行轨迹</text>
  <text x="680" y="200" text-anchor="middle" fill="#80cbc4" font-size="8">收集本轮任务的完整上下文</text>

  <line x1="920" y1="180" x2="990" y2="180" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="955" y="173" text-anchor="middle" fill="#4a90d9" font-size="8">轨迹</text>

  <!-- Step 2: Verify -->
  <rect x="1000" y="145" width="200" height="70" rx="8" fill="#1a237e" filter="url(#shadow)"/>
  <text x="1060" y="170" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">② Verify</text>
  <text x="1060" y="190" text-anchor="middle" fill="#9fa8da" font-size="9">验证正确性</text>
  <text x="1060" y="200" text-anchor="middle" fill="#9fa8da" font-size="8">安全+逻辑+合规审查</text>

  <!-- Step 3: Compress -->
  <rect x="1000" y="245" width="200" height="70" rx="8" fill="#e65100" filter="url(#shadow)"/>
  <text x="1060" y="270" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">③ Compress</text>
  <text x="1060" y="290" text-anchor="middle" fill="#ffcc80" font-size="9">压缩为技能片段</text>
  <text x="1060" y="300" text-anchor="middle" fill="#ffcc80" font-size="8">去冗余+结构化</text>

  <!-- Step 4: Evolve -->
  <rect x="680" y="245" width="240" height="70" rx="8" fill="#4a148c" filter="url(#shadow)"/>
  <text x="740" y="270" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">④ Evolve</text>
  <text x="740" y="290" text-anchor="middle" fill="#ce93d8" font-size="9">更新知识库</text>
  <text x="680" y="300" text-anchor="middle" fill="#ce93d8" font-size="8">更新策略集+技能库</text>

  <!-- Cycle arrows -->
  <path d="M 1000 215 Q 1100 215 1100 245" fill="none" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 1000 315 Q 1100 315 1100 345 Q 1100 370 920 370 Q 800 370 800 315" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="950" y="380" text-anchor="middle" fill="#4caf50" font-size="9">每次任务完成后自动循环</text>

  <!-- Bottom comparison -->
  <rect x="680" y="410" width="520" height="50" rx="8" fill="#0a1628" stroke="#2c3e50" stroke-width="1"/>
  <text x="940" y="432" text-anchor="middle" fill="#95a5a6" font-size="10">| 无Dream Agent：经验丢失，每次从头开始 | 有Dream Agent：持续进化，越用越聪明 |</text>
  <text x="940" y="450" text-anchor="middle" fill="#7f8c8d" font-size="9">同类任务处理效率月提升5-10% · 处置经验复用率0%→80%+</text>

  <!-- Footer -->
  <rect x="80" y="600" width="1120" height="70" rx="8" fill="#0a1628" stroke="#4a90d9" stroke-width="1" opacity="0.6"/>
  <text x="640" y="625" text-anchor="middle" fill="#4a90d9" font-size="13" font-weight="bold">核心价值</text>
  <text x="640" y="648" text-anchor="middle" fill="#95a5a6" font-size="10">
    BudgetDial：不浪费算力在简单任务上 · Dream Agent：不让经验消失在每次任务后
  </text>
</svg>
