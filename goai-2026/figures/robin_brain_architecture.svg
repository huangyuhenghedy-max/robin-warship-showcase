<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="gBrain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="gArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#00695c"/>
    </linearGradient>
    <linearGradient id="gDec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="100%" style="stop-color:#ef6c00"/>
    </linearGradient>
    <linearGradient id="gPit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#d32f2f"/>
    </linearGradient>
    <linearGradient id="gRule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <text x="640" y="38" text-anchor="middle" fill="#4a90d9" font-size="22" font-weight="bold" letter-spacing="3">Robin Brain 四层知识库架构</text>
  <text x="640" y="58" text-anchor="middle" fill="#7f8c8d" font-size="12">Four-Layer Knowledge Base for Context-Aware Agent Orchestration</text>

  <!-- Center: Brain Core -->
  <circle cx="640" cy="350" r="70" fill="url(#gBrain)" filter="url(#shadow)" opacity="0.95"/>
  <text x="640" y="340" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Robin Brain</text>
  <text x="640" y="360" text-anchor="middle" fill="#9fa8da" font-size="11">知识库核心</text>
  <text x="640" y="378" text-anchor="middle" fill="#7986cb" font-size="9">get_context()</text>

  <!-- Connection lines from center -->
  <line x1="640" y1="280" x2="640" y2="120" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="710" y1="310" x2="1010" y2="150" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="570" y1="310" x2="270" y2="150" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="570" y1="390" x2="270" y2="550" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="710" y1="390" x2="1010" y2="550" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Layer 1: architecture.md -->
  <rect x="440" y="80" width="400" height="55" rx="10" fill="url(#gArch)" filter="url(#shadow)"/>
  <text x="520" y="105" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📐 架构知识</text>
  <text x="520" y="123" text-anchor="middle" fill="#80cbc4" font-size="10">architecture.md</text>
  <text x="640" y="105" text-anchor="middle" fill="#b2dfdb" font-size="10">系统架构、SOTA对标表、技术选型</text>
  <text x="640" y="123" text-anchor="middle" fill="#80cbc4" font-size="10">竞品差距分析、模块依赖关系</text>

  <!-- Layer 2: decisions.md -->
  <rect x="740" y="120" width="340" height="55" rx="10" fill="url(#gDec)" filter="url(#shadow)"/>
  <text x="830" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📝 设计决策</text>
  <text x="910" y="145" text-anchor="middle" fill="#ffcc80" font-size="10">decisions.md</text>
  <text x="910" y="163" text-anchor="middle" fill="#ffe0b2" font-size="10">关键决策记录、备选方案对比、选择理由</text>

  <!-- Layer 3: pitfalls.md -->
  <rect x="200" y="120" width="340" height="55" rx="10" fill="url(#gPit)" filter="url(#shadow)"/>
  <text x="290" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">⚠️ 踩坑预警</text>
  <text x="370" y="145" text-anchor="middle" fill="#ef9a9a" font-size="10">pitfalls.md</text>
  <text x="370" y="163" text-anchor="middle" fill="#ffcdd2" font-size="10">已知错误、回滚原因、避坑方案</text>

  <!-- Layer 4: rules.md -->
  <rect x="200" y="520" width="340" height="55" rx="10" fill="url(#gRule)" filter="url(#shadow)"/>
  <text x="290" y="545" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📋 规则约束</text>
  <text x="370" y="545" text-anchor="middle" fill="#ce93d8" font-size="10">rules.md</text>
  <text x="370" y="563" text-anchor="middle" fill="#e1bee7" font-size="10">强制规则、安全约束、编码规范</text>

  <!-- Extra: Global Atomic -->
  <rect x="740" y="520" width="340" height="55" rx="10" fill="#1a237e" stroke="#536dfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="545" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🌐 全局原子知识</text>
  <text x="910" y="545" text-anchor="middle" fill="#8c9eff" font-size="10">跨项目共享知识</text>
  <text x="910" y="563" text-anchor="middle" fill="#c5cae9" font-size="10">SOTA基准、行业规则、跨项目连接</text>

  <!-- Bottom: Agent Flow -->
  <rect x="280" y="620" width="720" height="55" rx="25" fill="url(#gBrain)" stroke="#536dfe" stroke-width="1" filter="url(#shadow)"/>
  <text x="640" y="643" text-anchor="middle" fill="#b3e5fc" font-size="13">🤖 Agent 启动时自动加载 → get_context() 聚合四层知识 → 自动注入上下文</text>
  <text x="640" y="662" text-anchor="middle" fill="#7986cb" font-size="10">规则约束 → 踩坑预警 → 设计决策 → 架构知识 → 全局原子知识（分层注入）</text>

  <!-- Metrics -->
  <rect x="80" y="620" width="140" height="55" rx="8" fill="#0a1628" stroke="#2c3e50" stroke-width="1"/>
  <text x="150" y="642" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">4层</text>
  <text x="150" y="658" text-anchor="middle" fill="#7f8c8d" font-size="9">知识深度</text>

  <rect x="1060" y="620" width="140" height="55" rx="8" fill="#0a1628" stroke="#2c3e50" stroke-width="1"/>
  <text x="1130" y="642" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">100%</text>
  <text x="1130" y="658" text-anchor="middle" fill="#7f8c8d" font-size="9">上下文覆盖</text>
</svg>
