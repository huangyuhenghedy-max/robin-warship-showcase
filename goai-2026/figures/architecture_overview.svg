<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6e5c"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c3483"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#935116"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b241c"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Grid overlay -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="1280" y2="40" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#4a90d9" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#4a90d9" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="640" y="38" text-anchor="middle" fill="#4a90d9" font-size="22" font-weight="bold" letter-spacing="3">知更鸟战舰 · Robin Fleet — 5层指挥链架构图</text>
  <text x="640" y="58" text-anchor="middle" fill="#7f8c8d" font-size="12">5-Tier Command Chain Architecture for Multi-Agent Orchestration</text>

  <!-- L5: Flagship -->
  <rect x="440" y="80" width="400" height="65" rx="10" fill="url(#g5)" filter="url(#shadow)"/>
  <text x="640" y="105" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🏴 旗舰 Agent (Flagship)</text>
  <text x="640" y="125" text-anchor="middle" fill="#bdc3c7" font-size="11">战略规划 · 全局监控 · 任务分解 · 资源总调度</text>
  <text x="640" y="140" text-anchor="middle" fill="#85c1e9" font-size="10">L5 — 总指挥部 · 1 Agent</text>

  <!-- Arrow L5→L4 -->
  <line x1="640" y1="145" x2="640" y2="170" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="160" fill="#4a90d9" font-size="9">A2A Task: strategic_plan</text>

  <!-- Connect L5 to each L4 -->
  <line x1="490" y1="145" x2="230" y2="170" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="640" y1="145" x2="640" y2="170" stroke="#4a90d9" stroke-width="1.5" opacity="0.4"/>
  <line x1="790" y1="145" x2="1050" y2="170" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- L4: Fleet -->
  <rect x="80" y="175" width="340" height="60" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="250" y="200" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🚦 交通编队 Fleet</text>
  <text x="250" y="220" text-anchor="middle" fill="#bdc3c7" font-size="10">交通疏导 · 路障部署 · 车辆调度</text>

  <rect x="470" y="175" width="340" height="60" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="640" y="200" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🚑 应急编队 Fleet</text>
  <text x="640" y="220" text-anchor="middle" fill="#bdc3c7" font-size="10">救援调度 · 物资分配 · 人员疏散</text>

  <rect x="860" y="175" width="340" height="60" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="1030" y="200" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🏗️ 城管编队 Fleet</text>
  <text x="1030" y="220" text-anchor="middle" fill="#bdc3c7" font-size="10">排水调度 · 设施检查 · 市容维护</text>

  <text x="640" y="255" text-anchor="middle" fill="#27ae60" font-size="10">L4 — 战役指挥 · 2-5 Agents</text>

  <!-- L4→L3 arrows -->
  <line x1="250" y1="235" x2="250" y2="280" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="640" y1="235" x2="640" y2="280" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="1030" y1="235" x2="1030" y2="280" stroke="#27ae60" stroke-width="1.5"/>

  <!-- L3: Squad -->
  <rect x="80" y="285" width="220" height="55" rx="6" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="190" y="310" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">天河小队 Squad</text>
  <text x="190" y="328" text-anchor="middle" fill="#bdc3c7" font-size="9">天河区内涝排查</text>

  <rect x="320" y="285" width="220" height="55" rx="6" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="430" y="310" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">越秀小队 Squad</text>
  <text x="430" y="328" text-anchor="middle" fill="#bdc3c7" font-size="9">越秀区内涝排查</text>

  <rect x="560" y="285" width="220" height="55" rx="6" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="670" y="310" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">海珠小队 Squad</text>
  <text x="670" y="328" text-anchor="middle" fill="#bdc3c7" font-size="9">海珠区内涝排查</text>

  <rect x="800" y="285" width="220" height="55" rx="6" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="910" y="310" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">荔湾小队 Squad</text>
  <text x="910" y="328" text-anchor="middle" fill="#bdc3c7" font-size="9">荔湾区内涝排查</text>

  <rect x="1040" y="285" width="160" height="55" rx="6" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="1120" y="310" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">...更多小队</text>
  <text x="1120" y="328" text-anchor="middle" fill="#bdc3c7" font-size="9">5-20个</text>

  <text x="640" y="360" text-anchor="middle" fill="#8e44ad" font-size="10">L3 — 战术执行 · 5-20 Agents</text>

  <!-- L3→L2 arrows -->
  <line x1="250" y1="340" x2="250" y2="375" stroke="#8e44ad" stroke-width="1"/>
  <line x1="670" y1="340" x2="670" y2="375" stroke="#8e44ad" stroke-width="1"/>
  <line x1="1030" y1="340" x2="1030" y2="375" stroke="#8e44ad" stroke-width="1"/>

  <!-- L2: Captain -->
  <rect x="100" y="380" width="300" height="50" rx="6" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="250" y="405" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">石牌街道队长 Captain</text>
  <text x="250" y="421" text-anchor="middle" fill="#bdc3c7" font-size="9">分派一线人员 · 资源协调</text>

  <rect x="490" y="380" width="300" height="50" rx="6" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="640" y="405" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">天河南街道队长 Captain</text>
  <text x="640" y="421" text-anchor="middle" fill="#bdc3c7" font-size="9">分派一线人员 · 资源协调</text>

  <rect x="880" y="380" width="300" height="50" rx="6" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="1030" y="405" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">猎德街道队长 Captain</text>
  <text x="1030" y="421" text-anchor="middle" fill="#bdc3c7" font-size="9">分派一线人员 · 资源协调</text>

  <text x="640" y="450" text-anchor="middle" fill="#d4a017" font-size="10">L2 — 前线指挥 · 20-100 Agents</text>

  <!-- L2→L1 arrows -->
  <line x1="250" y1="430" x2="250" y2="465" stroke="#d4a017" stroke-width="1"/>
  <line x1="640" y1="430" x2="640" y2="465" stroke="#d4a017" stroke-width="1"/>
  <line x1="1030" y1="430" x2="1030" y2="465" stroke="#d4a017" stroke-width="1"/>

  <!-- L1: Executor -->
  <rect x="80" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="160" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">一线巡查员</text>
  <text x="160" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">巡查积水点</text>

  <rect x="260" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="340" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">排水作业员</text>
  <text x="340" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">打开排水设施</text>

  <rect x="440" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="520" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">交通疏导员</text>
  <text x="520" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">封锁低洼路段</text>

  <rect x="620" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="700" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">物资配送员</text>
  <text x="700" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">配送沙袋水泵</text>

  <rect x="800" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="880" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">人员疏散员</text>
  <text x="880" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">疏散被困群众</text>

  <rect x="980" y="470" width="160" height="50" rx="5" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="1060" y="493" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">信息上报员</text>
  <text x="1060" y="508" text-anchor="middle" fill="#f5b7b1" font-size="9">回传处置进度</text>

  <text x="640" y="540" text-anchor="middle" fill="#e74c3c" font-size="10">L1 — 一线执行 · 100-500 Agents</text>

  <!-- Bottom info bar -->
  <rect x="80" y="560" width="1120" height="60" rx="8" fill="#1a2a4a" stroke="#4a90d9" stroke-width="1" opacity="0.8"/>
  <text x="640" y="582" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">核心竞争力</text>
  <text x="640" y="600" text-anchor="middle" fill="#95a5a6" font-size="10">
    业界首创5层指挥链 | A2A v1.0完整实现 | 单层故障优雅降级 | O(n²) → O(n·log n)通信优化 | 已投产运行
  </text>

  <!-- Legend -->
  <rect x="80" y="630" width="1120" height="70" rx="6" fill="#0a1628" stroke="#2c3e50" stroke-width="1"/>
  <text x="640" y="652" text-anchor="middle" fill="#7f8c8d" font-size="11">知更鸟战舰 · 核心组件</text>
  
  <rect x="100" y="660" width="14" height="14" rx="3" fill="url(#g5)"/>
  <text x="120" y="672" fill="#bdc3c7" font-size="10">A2A协议桥接</text>
  
  <rect x="300" y="660" width="14" height="14" rx="3" fill="url(#g4)"/>
  <text x="320" y="672" fill="#bdc3c7" font-size="10">BudgetDial路由</text>
  
  <rect x="510" y="660" width="14" height="14" rx="3" fill="url(#g3)"/>
  <text x="530" y="672" fill="#bdc3c7" font-size="10">Robin Brain知识库</text>
  
  <rect x="740" y="660" width="14" height="14" rx="3" fill="url(#g2)"/>
  <text x="760" y="672" fill="#bdc3c7" font-size="10">Dream Agent进化</text>

  <rect x="980" y="660" width="14" height="14" rx="3" fill="url(#g1)"/>
  <text x="1000" y="672" fill="#bdc3c7" font-size="10">安全护栏系统</text>
</svg>
