要。",knowledgeTag:"排列组合"},{question:"函数 f(x) = log₂(x - 1) 的定义域是？",options:["x > 0","x ≥ 1","x > 1","x ≥ 0"],correctAnswer:"C",explanation:"对数函数的真数必须大于0：x - 1 > 0，所以 x > 1。",knowledgeTag:"对数函数定义域"},{question:"已知 |a| = 3，|b| = 4，且 a·b = 6，则 |a + b| = ？",options:["5","7","√37","√21"],correctAnswer:"C",explanation:"|a+b|² = |a|² + |b|² + 2a·b = 9 + 16 + 12 = 37。所以 |a+b| = √37。",knowledgeTag:"向量运算"}],hard:[{question:"若函数 f(x) = x³ - 3x + 1 在区间 [-2, 2] 上的最大值为？",options:["3","1","-1","3"],correctAnswer:"A",explanation:"求导 f'(x) = 3x² - 3 = 0，得 x = ±1。f(-2) = -8+6+1 = -1，f(-1) = -1+3+1 = 3，f(1) = 1-3+1 = -1，f(2) = 8-6+1 = 3。最大值3。",knowledgeTag:"函数最值"},{question:"从0,1,2,3,4,5中任取3个数字组成三位数，其中偶数的个数是？",options:["52","48","60","56"],correctAnswer:"A",explanation:"个位为偶数：0,2,4。分情况：个位为0时，百十位从5个选2排列=P(5,2)=20。个位为2或4时，百位不能为0且不能与个位重复，百位有4种选择，十位从剩下的4个选=4×4=16。总数=20+2×16=52。",knowledgeTag:"排列组合进阶"},{question:"已知数列 {aₙ} 满足 a₁ = 1，aₙ₊₁ = 2aₙ + 1，则 aₙ的通项公式是？",options:["aₙ = 2ⁿ - 1","aₙ = 2ⁿ⁻¹","aₙ = 2ⁿ + 1","aₙ = 2ⁿ⁻¹ - 1"],correctAnswer:"A",explanation:"构造法：aₙ₊₁ + 1 = 2(aₙ + 1)。令 bₙ = aₙ + 1，则 b₁ = 2，bₙ₊₁ = 2bₙ。所以 bₙ = 2ⁿ，aₙ = 2ⁿ - 1。",knowledgeTag:"数列递推"},{question:"椭圆 x²/9 + y²/4 = 1 上一点 P 到左焦点的距离为 3，则 P 到右焦点的距离为？",options:["1","3","5","6"],correctAnswer:"B",explanation:"椭圆定义：P到两焦点的距离之和为常数 2a。由方程知 a² = 9，a = 3，2a = 6。所以到右焦点的距离 = 6 - 3 = 3。",knowledgeTag:"椭圆定义"},{question:"若复数 z 满足 |z - 1| = |z - i|，则 z 在复平面内对应的点的轨迹是？",options:["圆","直线","椭圆","双曲线"],correctAnswer:"B",explanation:"设 z = x + yi，则 |x-1+yi| = |x+(y-1)i|。平方得 (x-1)²+y² = x²+(y-1)²，化简得 x = y。是一条直线。",knowledgeTag:"复数的几何意义"}]},physics:{basic:[{question:"一个物体做匀速直线运动，速度为 5m/s，10秒内通过的路程是？",options:["5m","10m","50m","2m"],correctAnswer:"C",explanation:"匀速直线运动的路程公式：s = vt = 5m/s × 10s = 50m。",knowledgeTag:"匀速直线运动"},{question:"下列哪个是国际单位制中力的单位？",options:["千克(kg)","牛顿(N)","焦耳(J)","瓦特(W)"],correctAnswer:"B",explanation:"力的国际单位是牛顿(N)。kg是质量单位，J是功/能量单位，W是功率单位。",knowledgeTag:"力学单位"},{question:"光在真空中的传播速度约为？",options:["3×10⁶ m/s","3×10⁷ m/s","3×10⁸ m/s","3×10⁹ m/s"],correctAnswer:"C",explanation:"光速c = 3×10⁸ m/s，这是宇宙中最快的速度。光从太阳到地球约需8分钟。",knowledgeTag:"光速"},{question:"一个200g的苹果所受重力约为？(g=10N/kg)",options:["0.2N","2N","20N","200N"],correctAnswer:"B",explanation:"G = mg = 0.2kg × 10N/kg = 2N。注意要将克换算为千克。",knowledgeTag:"重力计算"},{question:"下列哪种现象是扩散现象？",options:["风吹树叶摇动","糖在水中溶解","水沸腾","铁棒被磁化"],correctAnswer:"B",explanation:"扩散是分子无规则运动的结果。糖在水中溶解是糖分子扩散到水分子中。A是机械运动，C是物态变化，D是磁化。",knowledgeTag:"分子热运动"}],medium:[{question:"一个质量为2kg的物体从10m高处自由落下，落地时的速度约为？(g=10m/s²)",options:["10m/s","14m/s","20m/s","100m/s"],correctAnswer:"B",explanation:"机械能守恒：mgh = ½mv²。v = √(2gh) = √(2×10×10) = √200 ≈ 14.14 m/s。注意与质量无关！",knowledgeTag:"机械能守恒"},{question:"两个电阻 R₁=2Ω，R₂=3Ω 并联，总电阻为？",options:["5Ω","1.2Ω","6Ω","0.83Ω"],correctAnswer:"B",explanation:"并联电阻公式：1/R = 1/R₁ + 1/R₂ = 1/2 + 1/3 = 5/6。所以 R = 6/5 = 1.2Ω。并联总电阻小于任何一个分电阻。",knowledgeTag:"并联电阻"},{question:"一列波的频率为50Hz，波速为340m/s，则波长为？",options:["6.8m","3.4m","17m","0.68m"],correctAnswer:"A",explanation:"波速公式：v = fλ。所以 λ = v/f = 340/50 = 6.8m。",knowledgeTag:"机械波"},{question:"一个物体在水平面上受到10N的水平拉力，做匀速直线运动，则摩擦力为？",options:["0N","5N","10N","20N"],correctAnswer:"C",explanation:"物体做匀速直线运动，处于平衡状态，合力为零。所以摩擦力 = 拉力 = 10N。",knowledgeTag:"牛顿第一定律"},{question:"一杯水的温度从20°C升高到80°C，吸收了5040J的热量，水的质量是？(c水=4.2×10³ J/(kg·°C))",options:["0.02kg","0.03kg","0.04kg","0.05kg"],correctAnswer:"C",explanation:"Q = cmΔt，m = Q/(cΔt) = 5040/(4200×60) = 5040/252000 = 0.02kg。",knowledgeTag:"热量计算"}],hard:[{question:"一物体从静止开始做匀加速直线运动，第3秒内的位移为5m，则加速度为？",options:["1m/s²","2m/s²","3m/s²","4m/s²"],correctAnswer:"B",explanation:"第3秒内位移 = 前3秒位移 - 前2秒位移 = ½a·3² - ½a·2² = ½a(9-4) = 2.5a。所以2.5a=5，a=2m/s²。",knowledgeTag:"匀变速直线运动"},{question:"在光滑水平面上，A球以6m/s的速度与静止的B球发生正碰。mA=2kg，mB=4kg，若碰撞为弹性碰撞，碰后A的速度为？",options:["-2m/s","0m/s","2m/s","4m/s"],correctAnswer:"A",explanation:"弹性碰撞公式：vA' = (mA-mB)/(mA+mB)×vA = (2-4)/(2+4)×6 = (-2/6)×6 = -2m/s。A球反向运动。",knowledgeTag:"弹性碰撞"},{question:"一定质量的理想气体，从状态A(p₁,V₁,T₁)等温膨胀到B(p₂,V₂,T₁)，再等容升温到C(p₃,V₂,T₃)。整个过程气体对外做功为？",options:["p₁V₁ln(V₂/V₁)","p₂(V₂-V₁)","0","p₃V₂ - p₁V₁"],correctAnswer:"A",explanation:"等温膨胀过程气体对外做功 W = nRT₁·ln(V₂/V₁) = p₁V₁·ln(V₂/V₁)。等容过程不做功。所以总功就是等温膨胀的功。",knowledgeTag:"热力学"},{question:"一个单摆摆长为L，在摆动过程中摆线碰到钉子，钉子位于摆长正下方L/2处。则碰钉后小球的周期变为原来的多少倍？",options:["1/2","(√2+1)/2","1/√2","(1+√2/2)/2"],correctAnswer:"B",explanation:"碰钉前周期 T₁ = 2π√(L/g)。碰钉后，摆长一半为L，一半为L/2。新周期 T₂ = π√(L/g) + π√(L/2/g) = (1+1/√2)π√(L/g)",knowledgeTag:"单摆周期"}]},chemistry:{basic:[{question:"下列物质中，属于纯净物的是？",options:["食醋","冰水混合物","矿泉水","洁净的空气"],correctAnswer:"B",explanation:"冰和水是同一种物质（H₂O）的不同状态，所以冰水混合物是纯净物。食醋、矿泉水、空气都是混合物。",knowledgeTag:"物质的分类"},{question:"下列变化中，属于化学变化的是？",options:["玻璃破碎","铁生锈","水结冰","衣服晾干"],correctAnswer:"B",explanation:"铁生锈生成新物质Fe₂O₃，是化学变化。其他三项都是物理变化（形态或状态改变）。",knowledgeTag:"化学变化"},{question:"氧原子的原子序数为8，则其核外电子数为？",options:["6","8","10","16"],correctAnswer:"B",explanation:"原子中：核电荷数 = 质子数 = 原子序数 = 核外电子数。所以氧原子有8个电子。",knowledgeTag:"原子结构"},{question:"下列物质中，pH值最小的是？",options:["食醋","纯水","肥皂水","石灰水"],correctAnswer:"A",explanation:"pH < 7为酸性，=7中性，>7碱性。食醋含醋酸pH≈3最小。纯水pH=7，肥皂水和石灰水碱性pH>7。",knowledgeTag:"pH值"},{question:"化学方程式 2H₂ + O₂ → 2H₂O 表示？",options:["2个氢分子和1个氧分子生成2个水分子","2克氢和1克氧生成2克水","2升氢和1升氧生成2升水","2个氢原子和1个氧原子生成2个水分子"],correctAnswer:"A",explanation:"化学方程式的系数表示分子个数比，不能表示质量或体积。2H₂ + O₂ → 2H₂O 表示2个氢分子和1个氧分子反应生成2个水分子。",knowledgeTag:"化学方程式含义"}],medium:[{question:"在反应 2A + B → 3C 中，A的相对分子质量为20，B为32，则C的相对分子质量为？",options:["24","36","48","72"],correctAnswer:"A",explanation:"质量守恒：2×20 + 32 = 3×M(C)。所以 M(C) = 72/3 = 24。",knowledgeTag:"质量守恒定律"},{question:"下列各组离子能大量共存的是？",options:["H⁺, OH⁻, Na⁺","Ag⁺, Cl⁻, K⁺","Na⁺, NO₃⁻, Cl⁻","Ba²⁺, SO₄²⁻, Cu²⁺"],correctAnswer:"C",explanation:"A中H⁺+OH⁻→H₂O，B中Ag⁺+Cl⁻→AgCl↓，D中Ba²⁺+SO₄²⁻→BaSO₄↓。只有C中离子不反应。",knowledgeTag:"离子共存"},{question:"电解水的实验中，正极和负极产生的气体体积比约为？",options:["1:1","1:2","2:1","1:8"],correctAnswer:"B",explanation:"电解水：2H₂O → 2H₂↑ + O₂↑。正极产氧气（O₂），负极产氢气（H₂），体积比 O₂:H₂ = 1:2。",knowledgeTag:"电解水"},{question:"20°C时，NaCl的溶解度为36g。在此温度下，将40g NaCl放入100g水中，充分溶解后所得溶液质量为？",options:["140g","136g","100g","136g"],correctAnswer:"B",explanation:"溶解度为36g表示100g水中最多溶解36g NaCl。40g NaCl只能溶解36g，剩余4g未溶。溶液质量 = 100g + 36g = 136g。",knowledgeTag:"溶解度"},{question:"下列化合物中，氯元素的化合价最高的是？",options:["HCl","HClO","HClO₃","HClO₄"],correctAnswer:"D",explanation:"计算化合价：HCl中Cl为-1，HClO中Cl为+1，HClO₃中Cl为+5，HClO₄中Cl为+7。HClO₄中Cl化合价最高。",knowledgeTag:"化合价"}],hard:[{question:"在密闭容器中加热N₂O₅，反应为：2N₂O₅ → 4NO₂ + O₂。若初始N₂O₅为0.4mol，2min后剩余0.1mol，则平均反应速率为？",options:["0.05 mol/(L·min)","0.075 mol/(L·min)","0.15 mol/(L·min)","0.3 mol/(L·min)"],correctAnswer:"C",explanation:"v = Δc/Δt，Δn = 0.3mol。v(N₂O₅) = 0.3/(V·2) = 0.15/V。",knowledgeTag:"化学反应速率"},{question:"某烃0.1mol完全燃烧生成0.3mol CO₂和0.3mol H₂O，则该烃的分子式为？",options:["C₂H₆","C₃H₆","C₃H₈","C₄H₈"],correctAnswer:"B",explanation:"烃CxHy + (x+y/4)O₂ → xCO₂ + y/2H₂O。由0.1mol产0.3mol CO₂知x=3，产0.3mol H₂O知y/2=3，y=6。所以C₃H₆。",knowledgeTag:"有机物燃烧"},{question:"已知反应：C(s) + H₂O(g) ⇌ CO(g) + H₂(g) ΔH > 0，下列措施能提高H₂产率的是？",options:["增大压强","降低温度","增大H₂O(g)浓度","加入催化剂"],correctAnswer:"C",explanation:"ΔH>0为吸热反应。增大H₂O浓度平衡右移，H₂产率提高。增大压强平衡向气体体积减小的方向（左）移动。",knowledgeTag:"化学平衡移动"}]},biology:{basic:[{question:"人体呼吸作用的主要场所是？",options:["细胞核","线粒体","叶绿体","核糖体"],correctAnswer:"B",explanation:'线粒体是细胞呼吸的主要场所，被称为"细胞的动力工厂"。',knowledgeTag:"细胞结构"},{question:"人体内消化和吸收营养的主要器官是？",options:["胃","小肠","大肠","食道"],correctAnswer:"B",explanation:"小肠是消化和吸收的主要器官。小肠内壁有大量绒毛和微绒毛，增大了吸收面积。",knowledgeTag:"消化系统"},{question:"植物通过什么结构吸收水分和无机盐？",options:["叶","茎","根","花"],correctAnswer:"C",explanation:"植物的根从土壤中吸收水分和无机盐，通过根、茎中的导管向上运输。",knowledgeTag:"植物营养"},{question:"人体内氧气运输主要依靠？",options:["白细胞","血小板","红细胞","血浆"],correctAnswer:"C",explanation:"红细胞中的血红蛋白能与氧结合，将氧气从肺部运输到全身各组织细胞。",knowledgeTag:"血液循环"},{question:"DNA主要存在于细胞的哪个结构中？",options:["细胞膜","细胞质","细胞核","细胞壁"],correctAnswer:"C",explanation:"DNA（脱氧核糖核酸）主要存在于细胞核的染色体中，是遗传信息的携带者。",knowledgeTag:"遗传物质"}],medium:[{question:'在食物链"草→兔→鹰"中，若鹰的数量减少，短期内兔的数量会？',options:["增加","减少","不变","先增后减"],correctAnswer:"A",explanation:"鹰是兔的天敌。鹰减少→兔被捕食减少→短期内兔数量增加。",knowledgeTag:"生态平衡"},{question:"人体内胰岛素分泌不足可能导致？",options:["侏儒症","糖尿病","甲亢","呆小症"],correctAnswer:"B",explanation:"胰岛素降低血糖。分泌不足→血糖升高→糖尿病。",knowledgeTag:"激素调节"},{question:"有丝分裂过程中，染色体数目加倍发生在？",options:["间期","前期","中期","后期"],correctAnswer:"D",explanation:"有丝分裂后期着丝点分裂，姐妹染色单体分开成为独立的染色体，染色体数目加倍。",knowledgeTag:"细胞分裂"},{question:"下列属于特异性免疫的是？",options:["皮肤屏障","吞噬细胞吞噬","抗体作用","炎症反应"],correctAnswer:"C",explanation:"特异性免疫针对特定病原体产生记忆。抗体是特异性免疫的关键分子。",knowledgeTag:"免疫系统"},{question:"基因型为AaBb的个体自交，后代表现型比例为？(两对基因独立遗传)",options:["1:1:1:1","3:1","9:3:3:1","1:2:1"],correctAnswer:"C",explanation:"两对等位基因独立遗传时，杂合子自交后代表现型比例为9:3:3:1。",knowledgeTag:"遗传定律"}],hard:[{question:"在DNA分子中，若一条链中(A+T)/(G+C)=0.5，则互补链中该比例为？",options:["0.5","1","1.5","2"],correctAnswer:"A",explanation:"DNA双链中碱基互补配对：A=T，G=C。一条链的(A+T)/(G+C) = 互补链的(T+A)/(C+G) = 0.5。",knowledgeTag:"DNA结构"},{question:"某植物种群中AA占30%，aa占20%，则该种群中A的基因频率为？",options:["30%","45%","55%","70%"],correctAnswer:"C",explanation:"Aa = 100% - 30% - 20% = 50%。A的基因频率 = AA% + ½Aa% = 30% + 25% = 55%。",knowledgeTag:"基因频率"},{question:"在光合作用中，光反应阶段产生的[H]和ATP用于暗反应的哪个阶段？",options:["CO₂的固定","C₃的还原","C₅的再生","葡萄糖合成"],correctAnswer:"B",explanation:"光反应产生的[H](NADPH)和ATP用于暗反应的C₃还原阶段。CO₂固定不需要[H]和ATP。",knowledgeTag:"光合作用"}]},english:{basic:[{question:'Choose the correct form: "She ___ to school every day."',options:["go","goes","going","went"],correctAnswer:"B",explanation:"主语she是第三人称单数，一般现在时谓语动词加-s/es。go → goes。",knowledgeTag:"主语一致"},{question:'"I have ___ apple." 选择正确的冠词：',options:["a","an","the","不填"],correctAnswer:"B",explanation:"apple以元音音素开头，用不定冠词an。a用于辅音音素开头的词前。",knowledgeTag:"冠词"},{question:'Which word means "非常" in English?',options:["very","little","many","always"],correctAnswer:"A",explanation:"very = 非常。little = 少量，many = 许多，always = 总是。",knowledgeTag:"基础词汇"},{question:'"He is taller ___ his brother." 选择正确的介词：',options:["to","than","as","from"],correctAnswer:"B",explanation:'形容词比较级taller后接than，表示"比..."。',knowledgeTag:"比较级"},{question:'What is the past tense of "eat"?',options:["eated","ate","aten","eaten"],correctAnswer:"B",explanation:"eat是不规则动词，过去式为ate，过去分词为eaten。",knowledgeTag:"不规则动词"}],medium:[{question:'"If I ___ you, I would study harder." 选择正确的形式：',options:["am","was","were","be"],correctAnswer:"C",explanation:"与现在事实相反的虚拟语气，if从句用过去式were（不分人称）。",knowledgeTag:"虚拟语气"},{question:"The novel ___ into 20 languages so far.",options:["translated","was translated","has been translated","is translated"],correctAnswer:"C",explanation:'so far提示用现在完成时，小说"被"翻译，用被动语态。',knowledgeTag:"时态语态"},{question:"Choose the correct sentence:",options:["I don't know where is he.","I don't know where he is.","I don't know where he is?","I don't know where is he?"],correctAnswer:"B",explanation:"宾语从句用陈述语序。where he is是正确语序（主语+谓语）。",knowledgeTag:"宾语从句"},{question:'"Not only ___ the exam, but he also got the highest score."',options:["he passed","did he pass","he did pass","passed he"],correctAnswer:"B",explanation:"Not only位于句首引起倒装，助动词did提到主语前。",knowledgeTag:"倒装句"},{question:'The word "breakthrough" is closest in meaning to:',options:["breakdown","advancement","setback","routine"],correctAnswer:"B",explanation:"breakthrough = 突破/重大进展，与advancement(进步)最接近。",knowledgeTag:"词汇理解"}],hard:[{question:'"Had it not been for your help, I ___ the project on time."',options:["wouldn't finish","wouldn't have finished","didn't finish","hadn't finished"],correctAnswer:"B",explanation:"与过去事实相反的虚拟语气。Had it not been = If it had not been，主句用would have done。",knowledgeTag:"虚拟语气进阶"},{question:"The professor's lecture was so ___ that most students felt confused.",options:["lucid","abstruse","superficial","redundant"],correctAnswer:"B",explanation:"abstruse = 深奥难懂的，与felt confused对应。",knowledgeTag:"高级词汇"},{question:'"___ the difficulty, she persevered and eventually succeeded." 选最合适的连接词：',options:["Because of","In spite of","As a result of","In terms of"],correctAnswer:"B",explanation:"persevered(坚持)和difficulty(困难)是转折关系。in spite of = 尽管，表转折。",knowledgeTag:"连接词"},{qu
