<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>知更鸟战舰 · 旗舰指挥中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   知更鸟战舰 · 蓝粉青春版
   Palette: 蓝 5B9BD5 · 粉 D68BB9 · 暖白 FBF8F5 · 深蓝 2C3E50
   ═══════════════════════════════════════════════════════ */

/* ── Light Theme Tokens (Blue-Pink Youth) ── */
:root {
  --bg-canvas: #FBF8F5;
  --bg-surface: rgba(255,255,255,0.92);
  --bg-elevated: rgba(248,245,242,0.96);
  --bg-glass: rgba(255,255,255,0.68);
  --text-primary: #2C3E4A;
  --text-secondary: #5A6B7E;  /* a11y: 对比度 3.3→5.17 (WCAG AA 正文) */
  --text-tertiary: #7C899B;  /* a11y: 对比度 1.83→3.36 */
  --accent: #5B9BD5;
  --accent-soft: rgba(91,155,213,0.18);
  --accent-glow: rgba(91,155,213,0.22);
  --pink: #D68BB9;
  --pink-soft: rgba(214,139,185,0.18);
  --cyan: #7EC8E3;
  --cyan-soft: rgba(126,200,227,0.15);
  --green: #5CB85C;
  --green-soft: rgba(92,184,92,0.12);
  --yellow: #D4A853;
  --yellow-soft: rgba(212,168,83,0.15);
  --red: #D9534F;
  --red-soft: rgba(217,83,79,0.12);
  --border: rgba(44,62,74,0.07);
  --border-strong: rgba(44,62,74,0.14);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --elevation-0: 0 1px 3px rgba(91,155,213,0.08);
  --elevation-1: 0 4px 12px rgba(214,139,185,0.12), 0 1px 3px rgba(91,155,213,0.06);
  --elevation-2: 0 8px 24px rgba(91,155,213,0.10), 0 2px 6px rgba(214,139,185,0.06);
  --elevation-3: 0 12px 40px rgba(214,139,185,0.15), 0 3px 10px rgba(91,155,213,0.08);
  --font-sans: 'Plus Jakarta Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei UI', system-ui, sans-serif;
  --font-serif: 'Instrument Serif', 'Noto Serif SC', Georgia, serif;
  --mono: 'Cascadia Code','JetBrains Mono','SF Mono',ui-monospace,monospace;
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
  --ease-soft: cubic-bezier(0.4,0,0.2,1);
  --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
  --feather-youth:
    radial-gradient(42% 52% at 16% 12%, rgba(91,155,213,0.12) 0%, transparent 60%),
    radial-gradient(46% 56% at 86% 20%, rgba(214,139,185,0.11) 0%, transparent 62%),
    radial-gradient(54% 60% at 62% 96%, rgba(126,200,227,0.09) 0%, transparent 60%);
  /* ── Robin (崩铁·真实设定锚点) ──
     依据：天环族「金属天环」头顶饰 / 葱翠湖绿眼眸 / 礼服线谱图案 + 音符别针 + 芒星 + 珍珠
     来源：米哈游《崩坏：星穹铁道》官方角色设定（baidu/mihoyo 官方页） */
  --halo-gold: #E8C97A;            /* 天环·金属光环 */
  --robin-green: #6FBF9E;          /* 绿瞳·湖绿（真实眼眸色） */
  --robin-green-soft: rgba(111,191,158,0.16);
  --plume: rgba(214,139,185,0.10); /* 羽翼柔光 */
  --staff-lines: repeating-linear-gradient(0deg, transparent 0 23px, rgba(91,155,213,0.022) 23px 24px); /* 礼服线谱纹理 */
  --pearl: rgba(255,255,255,0.65); /* 珍珠高光 */
  /* ── 跨产品品牌锚点（与全局设计系统 robin-design-system.css 对齐）── */
  --brand-violet: #7C5CE7;   /* 同谐紫（全产品核心色） */
  --brand-gold:   #C9A86A;   /* 歌姬金（全产品辅助色） */
}

/* ── Dark Theme Tokens (Blue-Pink Night) ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-canvas: #2C3E50;
    --bg-surface: rgba(255,255,255,0.04);
    --bg-elevated: rgba(255,255,255,0.07);
    --bg-glass: rgba(255,255,255,0.06);
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.50);  /* a11y: 2.58→4.05 */
    --accent: #7EC8E3;
    --accent-soft: rgba(126,200,227,0.18);
    --accent-glow: rgba(126,200,227,0.28);
    --pink: #D68BB9;
    --pink-soft: rgba(214,139,185,0.18);
    --cyan: #7EC8E3;
    --cyan-soft: rgba(126,200,227,0.12);
    --green: #5CB85C;
    --green-soft: rgba(92,184,92,0.15);
    --yellow: #D4A853;
    --yellow-soft: rgba(212,168,83,0.15);
    --red: #D9534F;
    --red-soft: rgba(217,83,79,0.15);
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --elevation-0: 0 1px 2px rgba(0,0,0,0.2);
    --elevation-1: 0 2px 8px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15);
    --elevation-2: 0 4px 16px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.2);
    --elevation-3: 0 8px 32px rgba(0,0,0,0.4), 0 3px 10px rgba(0,0,0,0.25);
    --accent-gold: rgba(126,200,227,0.12);
    --halo-gold: #C9A24B;
    --robin-green: #7BC4A4;
    --robin-green-soft: rgba(123,196,164,0.18);
    --plume: rgba(214,139,185,0.10);
    --pearl: rgba(255,255,255,0.10);
  }
}

/* ── 第三主题：灰白紫（知更鸟·谐乐大典礼服银紫光泽锚点）── */
[data-theme="violet"]{
  --bg-canvas: #F2F0F7;
  --bg-surface: rgba(255,255,255,0.94);
  --bg-elevated: rgba(248,246,252,0.96);
  --bg-glass: rgba(255,255,255,0.72);
  --text-primary: #3A3550;
  --text-secondary: #635C86;  /* a11y: 3.42→5.46 */
  --text-tertiary: #8C86A2;  /* a11y: 1.81→3.07 */
  --accent: #8E7CC3;            /* 知更鸟紫·紫罗兰描边 */
  --accent-soft: rgba(142,124,195,0.18);
  --accent-glow: rgba(142,124,195,0.22);
  --pink: #C9A9D6;              /* 紫粉 */
  --pink-soft: rgba(201,169,214,0.18);
  --cyan: #9DB4E8;
  --cyan-soft: rgba(157,180,232,0.15);
  --green: #5CB85C;
  --green-soft: rgba(92,184,92,0.12);
  --yellow: #C9A24B;
  --yellow-soft: rgba(201,162,75,0.15);
  --red: #D9534F;
  --red-soft: rgba(217,83,79,0.12);
  --border: rgba(58,53,80,0.08);
  --border-strong: rgba(58,53,80,0.14);
  --elevation-0: 0 1px 3px rgba(142,124,195,0.08);
  --elevation-1: 0 4px 12px rgba(201,169,214,0.14), 0 1px 3px rgba(142,124,195,0.06);
  --elevation-2: 0 8px 24px rgba(142,124,195,0.10), 0 2px 6px rgba(201,169,214,0.06);
  --elevation-3: 0 12px 40px rgba(201,169,214,0.15), 0 3px 10px rgba(142,124,195,0.08);
  --feather-youth: radial-gradient(ellipse at 30% 20%, rgba(201,169,214,0.07) 0%, rgba(142,124,195,0.05) 50%, transparent 70%);
  --halo-gold: #C9A24B;
  --robin-green: #6FBF9E;
  --robin-green-soft: rgba(111,191,158,0.16);
  --plume: rgba(142,124,195,0.10);
  --staff-lines: repeating-linear-gradient(0deg, transparent 0 23px, rgba(142,124,195,0.022) 23px 24px);
  --pearl: rgba(255,255,255,0.65);
}
/* ── 第四主题：深紫夜（知更鸟·谐乐大典夜场 / 天环星夜锚点）── */
[data-theme="midnight"]{
  --bg-canvas: #15121F;
  --bg-surface: rgba(255,255,255,0.04);
  --bg-elevated: rgba(255,255,255,0.06);
  --bg-glass: rgba(255,255,255,0.05);
  --text-primary: rgba(243,239,252,0.94);
  --text-secondary: rgba(200,190,225,0.72);  /* a11y: 4.46→5.93 */
  --text-tertiary: rgba(180,170,210,0.55);  /* a11y: 2.09→3.39 */
  --accent: #B79CED;            /* 知更鸟紫·紫罗兰亮紫 */
  --accent-soft: rgba(183,156,237,0.20);
  --accent-glow: rgba(183,156,237,0.30);
  --pink: #E0A6D8;              /* 紫粉提亮 */
  --pink-soft: rgba(224,166,216,0.20);
  --cyan: #8FD4E8;
  --cyan-soft: rgba(143,212,232,0.14);
  --green: #5CB85C;
  --green-soft: rgba(92,184,92,0.16);
  --yellow: #E8C97A;
  --yellow-soft: rgba(232,201,122,0.18);
  --red: #FF6B6B;
  --red-soft: rgba(255,107,107,0.18);
  --border: rgba(183,156,237,0.12);
  --border-strong: rgba(183,156,237,0.20);
  --elevation-0: 0 1px 2px rgba(0,0,0,0.40);
  --elevation-1: 0 2px 10px rgba(0,0,0,0.50), 0 1px 3px rgba(183,156,237,0.06);
  --elevation-2: 0 4px 18px rgba(0,0,0,0.55), 0 2px 6px rgba(183,156,237,0.08);
  --elevation-3: 0 8px 34px rgba(0,0,0,0.60), 0 3px 10px rgba(183,156,237,0.10);
  --feather-youth: radial-gradient(ellipse at 30% 20%, rgba(224,166,216,0.07) 0%, rgba(183,156,237,0.05) 50%, transparent 70%);
  --staff-lines: repeating-linear-gradient(0deg, transparent 0 23px, rgba(183,156,237,0.03) 23px 24px);
  --accent-gold: rgba(183,156,237,0.14);
  --halo-gold: #E8C97A;         /* 天环·夜场更亮金属光环 */
  --robin-green: #8FD4B0;       /* 绿瞳·夜场提亮 */
  --robin-green-soft: rgba(143,212,176,0.20);
  --plume: rgba(183,156,237,0.12); /* 紫翼柔光 */
  --pearl: rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg-canvas);color:var(--text-primary);font-family:var(--font-sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button,input,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
a{color:var(--cyan);text-decoration:none}a:hover{text-decoration:underline}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.15)}}
@keyframes gold-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px var(--accent-glow)}50%{box-shadow:0 0 20px var(--accent-glow)}}
@keyframes note-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes brand-glow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.glass{
  background:
    linear-gradient(135deg, rgba(91,155,213,0.10), rgba(214,139,185,0.07)),
    var(--bg-glass);
  backdrop-filter:blur(20px) saturate(1.08);-webkit-backdrop-filter:blur(20px) saturate(1.08);
  border:1px solid rgba(214,139,185,0.22);
  box-shadow:var(--elevation-1), inset 0 1px 0 rgba(255,255,255,0.35);
}
.glass-elevated{
  background:
    linear-gradient(135deg, rgba(91,155,213,0.12), rgba(214,139,185,0.09)),
    var(--bg-elevated);
  backdrop-filter:blur(24px) saturate(1.10);-webkit-backdrop-filter:blur(24px) saturate(1.10);
  border:1px solid rgba(214,139,185,0.24);
  box-shadow:var(--elevation-2), inset 0 1px 0 rgba(255,255,255,0.40);
}

/* ── Top Bar (Robin Gold) ── */
.topbar{
  height:48px;display:flex;align-items:center;gap:14px;padding:0 16px;
  background:var(--bg-canvas);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
/* 天环·金属光环 logo（真实：天环族头顶飘浮的金属天环） */
.robin-halo{width:26px;height:26px;flex:0 0 auto;display:inline-block;filter:drop-shadow(0 0 4px var(--halo-gold));transition:transform var(--duration-slow) var(--ease-bounce);}
.robin-halo:hover{transform:rotate(180deg) scale(1.06);}
.topbar .brand{
  font-family:var(--font-serif);font-size:17px;font-weight:400;font-style:italic;
  background:linear-gradient(120deg,#5B9BD5,#7EC8E3,#D68BB9,#5B9BD5);
  background-size:300% 300%;animation:brand-glow 6s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;letter-spacing:0.02em;
}
.topbar .brand-sub{font-size:11px;color:var(--text-secondary);margin-left:2px;font-weight:500;white-space:nowrap;}
.topbar .spacer{flex:1}
.theme-toggle{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--bg-glass);border:1px solid var(--border);border-radius:999px;padding:5px 12px;cursor:pointer;transition:all var(--duration-fast) var(--ease-soft);display:inline-flex;align-items:center;gap:5px;}
.theme-toggle:hover{color:var(--accent);border-color:var(--accent);box-shadow:var(--elevation-0);}
.theme-toggle.active{color:#fff;background:linear-gradient(135deg,var(--accent),var(--pink));border-color:transparent;}
.top-status{display:flex;gap:8px;align-items:center;}
.chip{
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:var(--bg-surface);border:1px solid var(--border);
  color:var(--text-secondary);display:flex;align-items:center;gap:5px;white-space:nowrap;
  transition:background var(--duration-fast) var(--ease-soft),border-color var(--duration-fast) var(--ease-soft);
}
.chip b{color:var(--text-primary);font-weight:600;}
.chip .live-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:pulse-dot 2s ease-in-out infinite;}
.chip .live-dot.green{background:var(--green);box-shadow:0 0 4px var(--green);}
.chip .live-dot.dead{background:var(--text-tertiary);animation:none;}

/* ── Main Layout ── */
.layout{
  display:grid;
  grid-template-columns:280px 1fr 320px;
  height:calc(100vh - 48px);
  gap:0;
}
.sidebar-left,.sidebar-right{overflow-y:auto;overflow-x:hidden;}
.sidebar-left{
  background:var(--bg-canvas);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:0;
}
.sidebar-right{
  background:var(--bg-canvas);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;gap:0;
}

/* ── Section Headers (Blue-Pink Accent) ── */
.section-header{
  display:flex;align-items:center;gap:8px;
  padding:14px 14px 8px;
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text-tertiary);user-select:none;
  position:sticky;top:0;z-index:10;
  background:var(--bg-canvas);
  border-bottom:1px solid var(--pink-soft);
}
.section-header .count{
  font-size:10px;padding:1px 6px;border-radius:4px;
  background:var(--bg-surface);color:var(--text-secondary);
  font-weight:500;letter-spacing:0;
}

/* ── Squadron Cards ── */
.squad-card{
  padding:10px 12px;margin:0 10px 6px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-surface);box-shadow:var(--elevation-0);
  transition:all var(--duration-fast) var(--ease-soft);
  cursor:default;
}
.squad-card:hover{border-color:var(--accent);box-shadow:var(--elevation-1),inset 0 0 0 1px var(--pearl),0 0 16px var(--accent-glow);background:var(--accent-gold);transform:translateY(-2px);}
.squad-card .top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.squad-card .name{font-size:12.5px;font-weight:600;color:var(--text-primary);}
.squad-card .project{font-size:10.5px;color:var(--text-secondary);margin-bottom:3px;}
.squad-card .meta{display:flex;gap:8px;font-size:10.5px;color:var(--text-tertiary);align-items:center;flex-wrap:wrap;}
.squad-card .template-tag{
  font-size:9.5px;padding:1px 6px;border-radius:4px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid var(--accent-soft);letter-spacing:0.02em;
}
.status-indicator{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 auto;}
.status-dot.green{background:var(--green);box-shadow:0 0 5px var(--green);}
.status-dot.gray{background:var(--text-tertiary);}
.status-dot.red{background:var(--red);box-shadow:0 0 5px var(--red);}
.status-dot.blue{background:var(--cyan);box-shadow:0 0 5px var(--cyan);}
.status-dot.yellow{background:var(--yellow);}

/* ── Burn Ring (Gold Gradient) ── */
.burn-section{padding:6px 14px 14px;display:flex;flex-direction:column;align-items:center;}
.burn-ring{position:relative;width:110px;height:110px;}
.burn-ring svg{transform:rotate(-90deg);}
.burn-ring .ring-bg{stroke:var(--border-strong);}
.burn-ring .ring-fg{stroke:url(#burn-grad);stroke-linecap:round;transition:stroke-dashoffset 0.8s var(--ease-bounce);}
.burn-ring .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.burn-ring .ring-val{font-size:18px;font-weight:700;color:var(--text-primary);}
.burn-ring .ring-sub{font-size:9.5px;color:var(--text-tertiary);margin-top:1px;}

/* ── Doctrine Stats ── */
.doctrine-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 10px 10px;}
.doctrine-item{
  padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg-surface);text-align:center;
  transition:border-color var(--duration-fast) var(--ease-soft),box-shadow var(--duration-fast) var(--ease-soft);
  box-shadow:var(--elevation-0);
}
.doctrine-item:hover{border-color:var(--accent);box-shadow:var(--elevation-1),0 0 16px var(--accent-glow);transform:translateY(-2px);}
.doctrine-item .name{font-size:10px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
.doctrine-item .stat-row{display:flex;justify-content:center;gap:8px;font-size:10px;color:var(--text-tertiary);}
.doctrine-item .stat-row b{color:var(--text-primary);font-weight:600;}

/* ── Center: Chat (Blue-Pink Youth) ── */
.center{
  position:relative;display:flex;flex-direction:column;min-width:0;min-height:0;
  background:var(--staff-lines),var(--feather-youth),var(--bg-canvas);
  background-attachment:fixed;overflow:hidden;
}
/* 立绘氛围层：知更鸟羽翼+天环剪影（真实：天环族羽翼轮廓 + 头顶飘浮金属天环），极低透明不挡内容 */
.robin-aura{position:absolute;right:-40px;bottom:-30px;width:340px;height:340px;pointer-events:none;z-index:0;opacity:0.05;color:var(--accent);animation:aura-float 9s ease-in-out infinite;}
.robin-aura svg{width:100%;height:100%;display:block;transform-origin:50% 42%;animation:wing-flap 6.5s ease-in-out infinite;}
@keyframes wing-flap{0%,100%{transform:scaleY(1) rotate(0)}50%{transform:scaleY(0.93) rotate(0.6deg)}}
.center > *:not(.robin-aura){position:relative;z-index:1;}
@keyframes aura-float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(1.5deg)}}
@media (prefers-color-scheme: dark){.robin-aura{opacity:0.07;}}
[data-theme="violet"] .robin-aura{opacity:0.06;}
[data-theme="midnight"] .robin-aura{opacity:0.10;}
.chat{
  flex:1;overflow-y:auto;min-height:0;padding:24px 0;
  display:flex;flex-direction:column;gap:16px;
}
.msg{display:flex;gap:12px;padding:0 28px;align-items:flex-start;animation:slideUp var(--duration-normal) var(--ease-bounce);}
.msg-user{flex-direction:row-reverse;}
.msg .avatar{
  width:30px;height:30px;border-radius:8px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.msg-user .avatar{background:linear-gradient(135deg,#5B9BD5,#D68BB9);}
.msg-ai .avatar{background:var(--pink-soft);border:1px solid var(--pink-soft);color:var(--pink);font-size:14px;}
.msg-label{font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--text-secondary);}
.msg-label-meta{display:inline-flex;align-items:center;gap:8px;}
.msg-timestamp{font-variant-numeric:tabular-nums;letter-spacing:0;}
.msg-pulse{width:8px;height:8px;border-radius:999px;background:var(--accent);opacity:0.35;}
.msg-ai.streaming .msg-pulse{opacity:0.8;animation:pulse-dot 1.5s ease-in-out infinite;}
.msg .bubble-wrap{flex:1;min-width:0;}

/* Bubble */
.bubble{
  width:fit-content;min-width:min(112px,48%);max-width:min(86%,560px);
  padding:clamp(8px,1.7vw,13px) clamp(11px,2.2vw,18px);
  border-radius:clamp(12px,2vw,18px);line-height:1.5;
  font-size:14px;word-wrap:break-word;
  animation:fadeIn var(--duration-normal) var(--ease-bounce);
  box-shadow:var(--elevation-0);
}
.msg-ai .bubble{background:var(--bg-surface);border:1px solid var(--border);border-top-left-radius:4px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
.msg-user .bubble{justify-self:end;background:linear-gradient(135deg,rgba(91,155,213,0.18),rgba(214,139,185,0.12));
  border:1px solid rgba(91,155,213,0.3);border-top-right-radius:4px;color:var(--text-primary);}
.msg-user .bubble-wrap{display:flex;flex-direction:column;align-items:flex-end;}
.msg-user .msg-label{flex-direction:row-reverse;}

/* Run status label (Robin Gold) */
.msg-run-status{display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:11.5px;color:var(--text-tertiary);animation:fadeIn 0.2s ease;}
.msg-run-status-dot{width:6px;height:6px;border-radius:50%;flex:0 0 auto;animation:pulse-dot 1.5s ease-in-out infinite;}
.msg-run-status[data-run-status="waiting"] .msg-run-status-dot{background:var(--text-tertiary);}
.msg-run-status[data-run-status="streaming_text"] .msg-run-status-dot{background:var(--pink);}
.msg-run-status[data-run-status="tool_pending"] .msg-run-status-dot{background:var(--accent);}
.msg-run-status[data-run-status="interrupted"] .msg-run-status-dot{background:var(--text-secondary);}
.msg-run-status[data-run-status="error_recoverable"] .msg-run-status-dot{background:var(--red);}

/* Blue-Pink streaming cursor: ♪ */
.stream-cursor{display:inline;}
.stream-cursor::after{content:'\266A';color:var(--pink);font-weight:400;margin-left:2px;animation:note-bounce 1s ease-in-out infinite;}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* Typing indicator (3-dot gold) */
.typing{display:inline-flex;gap:5px;align-items:center;padding:4px 0;}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typingBlink 1.2s ease-in-out infinite;}
.typing i:nth-child(2){animation-delay:0.2s;}
.typing i:nth-child(3){animation-delay:0.4s;}
@keyframes typingBlink{0%,60%,100%{opacity:0.2}30%{opacity:1}}

/* Multi-block skeleton */
.msg-ai.thinking .bubble{position:relative;overflow:hidden;}
.msg-ai.thinking .skeleton-grid{display:grid;grid-template-columns:28px 1fr;gap:8px;align-items:center;height:28px;}
.msg-ai.thinking .skeleton-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(90deg,var(--pink-soft) 25%,var(--accent-soft) 50%,var(--pink-soft) 75%);background-size:200% 100%;animation:gold-shimmer 1.8s ease-in-out infinite;}
.msg-ai.thinking .skeleton-name{height:12px;border-radius:4px;background:linear-gradient(90deg,var(--border) 25%,var(--border-strong) 50%,var(--border) 75%);background-size:200% 100%;animation:gold-shimmer 1.8s ease-in-out infinite;width:60%;}
.msg-ai.thinking .skeleton-line{height:10px;border-radius:4px;background:linear-gradient(90deg,var(--border) 25%,var(--border-strong) 50%,var(--border) 75%);background-size:200% 100%;animation:gold-shimmer 1.8s ease-in-out infinite;margin-top:6px;}
.msg-ai.thinking .skeleton-line:nth-child(2){width:80%;}
.msg-ai.thinking .skeleton-line:nth-child(3){width:45%;}

/* Streaming code block dim */
.msg-ai.streaming pre,.msg-ai.streaming code:not(.stream-cursor){opacity:0.6;transition:opacity 0.3s ease;}

/* Execution report card */
.exec-box{margin-top:8px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg-elevated);border:1px solid var(--border);font-size:12px;line-height:1.7;}
.exec-head{font-weight:600;color:var(--text-primary);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.exec-badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;}
.exec-badge.live{background:var(--red-soft);color:var(--red);border:1px solid rgba(217,83,79,0.2);}
.exec-badge.dry{background:var(--yellow-soft);color:var(--accent);border:1px solid rgba(212,168,83,0.2);}
.exec-row{color:var(--text-secondary);}
.exec-row b{color:var(--text-primary);}
.exec-row .ok{color:var(--green);}
.exec-row .fail{color:var(--red);}
.exec-err{margin-top:3px;color:var(--red);font-size:11.5px;}

/* Markdown */
.bubble h2{font-size:15px;margin:0.4em 0 0.3em;}
.bubble h3{font-size:14px;margin:0.4em 0 0.3em;color:var(--accent);}
.bubble p{margin:0.4em 0;}
.bubble ul,.bubble ol{margin:0.4em 0 0.4em 1.3em;}
.bubble li{margin:0.2em 0;}
.bubble strong{color:var(--text-primary);font-weight:700;}
.bubble em{color:var(--accent);font-style:normal;}
.bubble blockquote{margin:0.5em 0;padding:8px 12px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;color:var(--text-secondary);}
.bubble code{font-family:var(--mono);font-size:12.5px;background:var(--accent-soft);padding:1px 6px;border-radius:5px;}
.bubble pre{position:relative;margin:0.6em 0;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:12px 14px;overflow-x:auto;}
.bubble pre .code-lang{position:absolute;top:8px;left:12px;font-size:10px;color:var(--text-tertiary);font-family:var(--mono);text-transform:lowercase;letter-spacing:0.02em;}
.bubble pre code{background:none;padding:0;font-size:12.5px;color:var(--text-primary);line-height:1.55;}
.bubble pre .copy-btn{position:absolute;top:8px;right:8px;font-size:10px;padding:3px 8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);border-radius:6px;cursor:pointer;transition:color var(--duration-fast) var(--ease-soft),border-color var(--duration-fast) var(--ease-soft);}
.bubble pre .copy-btn:hover{color:var(--text-primary);border-color:var(--accent);}

/* ── Task Progress Board ── */
.task-panel{padding:0 14px 10px;}
.task-bar-wrap{margin-bottom:8px;animation:fadeIn var(--duration-normal);}
.task-bar-wrap .label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:3px;}
.task-bar-wrap .label span:last-child{font-family:var(--mono);font-size:10px;color:var(--text-tertiary);}
.task-bar{height:4px;border-radius:2px;background:var(--border-strong);overflow:hidden;position:relative;}
.task-bar .fill{height:100%;border-radius:2px;transition:width 0.6s var(--ease-bounce);}
.task-bar .fill.running{background:linear-gradient(90deg,var(--accent),var(--cyan));}
.task-bar .fill.completed{background:var(--green);}
.task-bar .fill.failed{background:var(--red);}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 14px 10px;}
.stat-card{
  padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg-surface);text-align:center;box-shadow:var(--elevation-0);
  transition:border-color var(--duration-fast) var(--ease-soft),box-shadow var(--duration-fast) var(--ease-soft);
}
.stat-card:hover{border-color:var(--accent);box-shadow:var(--elevation-1),0 0 16px var(--accent-glow);transform:translateY(-2px);}
.stat-card .v{font-size:16px;font-weight:700;font-family:var(--mono);}
.stat-card .l{font-size:9.5px;color:var(--text-tertiary);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em;}

/* ── Audit Event Stream ── */
#event-log{padding:0 14px 14px;max-height:200px;overflow-y:auto;}
.ev-row{
  display:flex;align-items:center;gap:6px;
  padding:3px 0;font-size:11px;color:var(--text-secondary);
  animation:fadeIn 0.25s ease;border-bottom:1px solid transparent;
}
.ev-row:hover{background:var(--bg-surface);border-radius:4px;}
.ev-row .ev-ts{font-family:var(--mono);font-size:9px;color:var(--text-tertiary);white-space:nowrap;}
.ev-row .ev-dot{width:5px;height:5px;border-radius:50%;flex:0 0 auto;}
.ev-row.blocked{color:var(--red);}
.ev-row.blocked .ev-dot{background:var(--red);box-shadow:0 0 4px var(--red);}
.ev-row.passed .ev-dot{background:var(--green);}
.ev-row .ev-path{font-family:var(--mono);font-size:9.5px;color:var(--text-tertiary);}

/* ── Heartbeat ── */
.heartbeat{margin:0 14px 10px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);display:flex;align-items:center;gap:8px;box-shadow:var(--elevation-0);}
.heartbeat .dot{width:7px;height:7px;border-radius:50%;animation:pulse-dot 2s ease-in-out infinite;}
.heartbeat .dot.green{background:var(--green);box-shadow:0 0 5px var(--green);}
.heartbeat .dot.red{background:var(--red);box-shadow:0 0 5px var(--red);}
.heartbeat .label{font-size:11px;color:var(--text-secondary);}
.heartbeat .status{font-size:10px;font-family:var(--mono);color:var(--text-tertiary);margin-left:auto;}

/* ── Composer ── */
.composer{display:flex;gap:10px;align-items:flex-end;padding:12px 28px 18px;border-top:1px solid var(--border);background:var(--bg-canvas);}
.composer textarea{
  flex:1;max-height:160px;min-height:46px;resize:none;
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:14px;color:var(--text-primary);
  padding:13px 16px;font-size:14px;line-height:1.5;
  outline:none;transition:border-color var(--duration-fast) var(--ease-soft),box-shadow var(--duration-fast) var(--ease-soft);
}
.composer textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.composer textarea::placeholder{color:var(--text-tertiary);}
.send-btn{
  width:46px;height:46px;flex:0 0 auto;border:none;border-radius:14px;
  background:linear-gradient(135deg,#5B9BD5,#D68BB9);color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:filter var(--duration-fast) var(--ease-soft),transform var(--duration-fast) var(--ease-soft);
  cursor:pointer;box-shadow:var(--elevation-1);
}
.send-btn:hover{filter:brightness(1.12);transform:scale(1.03);box-shadow:var(--elevation-2);}
.send-btn:disabled{opacity:0.5;cursor:default;transform:none;filter:none;box-shadow:none;}
.stop-btn{
  width:46px;height:46px;flex:0 0 auto;border:none;border-radius:14px;display:none;
  background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;font-size:16px;
  align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--elevation-1);
  transition:filter var(--duration-fast) var(--ease-soft),transform var(--duration-fast) var(--ease-soft);
}
.stop-btn:hover{filter:brightness(1.1);transform:scale(1.03);}
.stop-btn:active{transform:scale(0.96);}
.retry-btn{
  margin-top:8px;align-self:flex-start;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);
  transition:all var(--duration-fast) var(--ease-soft);
}
.retry-btn:hover{color:var(--text-primary);border-color:var(--accent);background:var(--accent-soft);}

/* ── Toast (轻量瞬时反馈) ── */
.toast-wrap{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.toast{padding:10px 16px;border-radius:10px;font-size:13px;background:var(--bg-surface);border:1px solid var(--border);box-shadow:var(--elevation-2);color:var(--text-primary);opacity:1;transition:opacity .3s var(--ease-soft);animation:toast-in .25s var(--ease-soft);max-width:80vw;}
.toast.ok{border-color:#22c55e;}
.toast.warn{border-color:#f59e0b;}
.toast.err{border-color:#ef4444;}
.scroll-jump{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);display:none;align-items:center;gap:4px;font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;z-index:60;background:var(--accent);color:#fff;border:none;box-shadow:var(--elevation-2);animation:toast-in .25s var(--ease-soft);}
.scroll-jump:hover{filter:brightness(1.08);}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ── Suggestion Chips ── */
.suggest{display:flex;gap:8px;flex-wrap:wrap;padding:0 28px 8px;}
.suggest .chip{
  cursor:pointer;transition:all var(--duration-fast) var(--ease-soft);
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);
  user-select:none;
}
.suggest .chip:hover{color:var(--text-primary);border-color:var(--accent);background:var(--accent-soft);}

/* ── Task Items ── */
.task-item{
  margin:0 10px 5px;padding:7px 10px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-surface);font-size:11px;box-shadow:var(--elevation-0);
  transition:border-color var(--duration-fast) var(--ease-soft),box-shadow var(--duration-fast) var(--ease-soft);
  animation:fadeIn var(--duration-normal);
}
.task-item:hover{border-color:var(--accent);box-shadow:var(--elevation-1);}
.task-item .row{display:flex;justify-content:space-between;align-items:center;}
.task-item .id{font-family:var(--mono);color:var(--text-tertiary);font-size:9px;}
.task-item .dep{font-size:9.5px;color:var(--cyan);margin-left:4px;}
.task-item .q{font-size:10px;color:var(--accent);margin-top:3px;line-height:1.4;}
.task-item.live{border-color:var(--accent);animation:glow-pulse 2s ease-in-out infinite;}

/* ── Empty States ── */
.empty-state{color:var(--text-tertiary);font-size:12px;padding:12px 14px;text-align:center;}

/* ── Live Event Dot ── */
#ev-live{transition:color var(--duration-fast);}

/* ── Accessibility: Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after{animation-duration:0.001ms!important;animation-iteration-count:1!important;transition-duration:0.001ms!important;transition-delay:0ms!important;}
  .task-item.live{animation:none!important;}
  .topbar .brand{animation:none!important;}
}

/* ── Focus Visible (Accessibility) ── */
button:focus-visible,.chip:focus-visible,.send-btn:focus-visible,.suggest .chip:focus-visible,.copy-btn:focus-visible,.theme-toggle:focus-visible,.composer textarea:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
  box-shadow:0 0 0 4px var(--accent-soft), 0 0 14px var(--accent-glow);
}

/* ── Responsive ── */
@media(max-width:1100px){.layout{grid-template-columns:240px 1fr 260px;}}
@media(max-width:900px){
  .layout{grid-template-columns:1fr;height:calc(100vh - 48px - 54px);}
  .sidebar-left,.sidebar-right,.center{display:none;}
  .sidebar-left.tab-active,.sidebar-right.tab-active,.center.tab-active{display:flex;min-height:0;}
}

/* ── Mobile Tab Bar ── */
.mobile-tabbar{display:none;}
@media(max-width:900px){
  .mobile-tabbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:54px;z-index:200;
    background:var(--bg-surface);border-top:1px solid var(--border);
    backdrop-filter:blur(20px) saturate(1.04);-webkit-backdrop-filter:blur(20px) saturate(1.04);
  }
  .mobile-tabbar button{
    flex:1;border:none;background:none;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    color:var(--text-secondary);font-size:10px;font-weight:600;
    transition:color var(--duration-fast) var(--ease-soft);
  }
  .mobile-tabbar button .ico{font-size:18px;line-height:1;}
  .mobile-tabbar button.tab-active{color:var(--accent);}
  .mobile-tabbar button.tab-active .ico{filter:drop-shadow(0 0 4px var(--accent-glow));}
}

/* ── Perf: GPU hints on animated elements ── */
.robin-aura{will-change:transform;transform:translateZ(0);}
.topbar .brand{will-change:background-position;}
.task-item.live{will-change:box-shadow;}
.burn-ring{will-change:transform;}

/* ── A11y: Skip link (WCAG 2.4.1) ── */
.skip-link{
  position:absolute;left:-9999px;top:8px;z-index:99999;
  background:var(--bg-surface);color:var(--text-primary);
  padding:8px 16px;border-radius:8px;border:1px solid var(--accent);
  box-shadow:var(--elevation-2);text-decoration:none;font-size:13px;font-weight:600;
}
.skip-link:focus{left:12px;outline:2px solid var(--accent);outline-offset:2px;}

/* ── Offline banner (resilience) ── */
.offline-banner{
  display:none;align-items:center;gap:8px;justify-content:center;
  position:sticky;top:0;z-index:300;
  padding:7px 14px;font-size:12.5px;font-weight:600;
  background:linear-gradient(135deg,rgba(217,83,79,0.14),rgba(245,158,11,0.14));
  color:var(--red);border-bottom:1px solid var(--border-strong);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.offline-banner.show{display:flex;animation:toast-in .25s var(--ease-soft);}
.offline-banner .pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:glow-pulse 1.4s ease-in-out infinite;}

/* ── Data Viz: sparkline card ── */
.spark-card{margin:6px 10px 4px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-surface);box-shadow:var(--elevation-0);}
.spark-card .head{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px;color:var(--text-secondary);margin-bottom:2px;}
.spark-card .head b{color:var(--text-primary);font-size:13px;font-family:var(--mono);}
.spark-card svg{display:block;width:100%;height:34px;}

/* ── User message optimistic status ── */
.msg-user .msg-status{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:5px;background:var(--text-tertiary);transition:background .3s,box-shadow .3s;vertical-align:middle;}
.msg-user.delivered .msg-status{background:var(--green);box-shadow:0 0 5px var(--green-soft);}

/* ── Command Palette (Cmd/Ctrl+K) ── */
.cmd-palette{display:none;position:fixed;inset:0;z-index:99998;background:rgba(20,28,38,0.42);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding-top:14vh;}
.cmd-palette.open{display:flex;animation:toast-in .18s var(--ease-soft);}
.cmd-box{
  width:min(540px,92vw);border-radius:var(--radius-lg);box-shadow:var(--elevation-3);overflow:hidden;
  border:1px solid transparent;
  background:
    linear-gradient(var(--bg-surface),var(--bg-surface)) padding-box,
    linear-gradient(135deg, rgba(91,155,213,0.55), rgba(214,139,185,0.55)) border-box;
}
.cmd-box input{width:100%;border:none;background:transparent;padding:16px 18px;font-size:15px;color:var(--text-primary);outline:none;font-family:inherit;border-bottom:1px solid var(--border);}
.cmd-box input::placeholder{color:var(--text-tertiary);}
.cmd-list{max-height:46vh;overflow:auto;padding:6px;}
.cmd-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text-primary);}
.cmd-item .ico{font-size:16px;width:20px;text-align:center;}
.cmd-item .hint{margin-left:auto;font-size:11px;color:var(--text-tertiary);}
.cmd-item.active,.cmd-item:hover{background:var(--accent-soft);box-shadow:0 0 14px var(--accent-glow);transform:translateY(-1px);}
.cmd-item kbd{font-family:var(--mono);font-size:10px;background:var(--bg-canvas);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text-secondary);}
</style>
</head>
<body>
<a class="skip-link" href="#chat-messages">跳到聊天</a>

<!-- 离线横幅（韧性：API 不可达时显示） -->
<div class="offline-banner" id="offline-banner" role="status" aria-live="polite">

<script>
// ═══════════════════════════════════════════════════════
// 知更鸟战舰 · 旗舰指挥中心
// Vanilla JS — no dependencies, no build step
// ═══════════════════════════════════════════════════════

const API = location.origin || 'http://127.0.0.1:19531';
const TARGET = 1800;
const RING_LEN = 2 * Math.PI * 47; // r=47
const $ = id => document.getElementById(id);

// ── Data State ──
const liveTasks = new Map();   // task_id -> {task_type,status,receiver,deps,question,ts}
const eventLog = [];           // recent audit events

// ── Performance / Offline / Viz state ──
const mdCache = new Map();      // markdown render cache (avoid re-parse)
const CHAT_CAP = 200;           // chat DOM node cap (prevent unbounded growth)
const sparkBuf = [];            // engine-call sparkline ring buffer
const SPARK_MAX = 40;
const lastSig = {};             // panel change-detection signatures
const panelHTML = {};           // last rendered panel HTML (for offline cache)
const offlineQueue = [];        // commands queued while API unreachable
let isOnline = (typeof navigator!=='undefined') ? navigator.onLine!==false : true;
let notifPerm = ('Notification' in window) ? Notification.permission : 'unsupported';

// ── XSS-safe escape ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── change-detection render helper (perf: skip innerHTML write when unchanged) ──
function setHTML(id, html){
  if(lastSig[id] === html) return;   // content identical → no DOM mutation (kills 5s thrash)
  lastSig[id] = html;
  const el = $(id); if(!el) return;
  el.innerHTML = html;
  panelHTML[id] = html;
}

// ── Status helpers ──
function statusColor(s){
  const m={idle:'gray',active:'green',working:'blue',busy:'yellow',running:'green',completed:'green',failed:'red',error:'red',pending:'gray',processing:'blue'};
  return m[s]||'gray';
}
function statusTag(s){
  const c={idle:'#6b7280',active:'#22c55e',working:'#3b82f6',busy:'#eab308',completed:'#22c55e',failed:'#ef4444',error:'#ef4444',pending:'#6b7280',processing:'#3b82f6'};
  const col=c[s]||'#6b7280';
  return `<span style="background:${col}18;color:${col};padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;">${esc(s)}</span>`;
}
function templateLabel(t){
  const m={carrier_strike:'航母',amphibious:'两栖',recon:'侦察',bomber:'轰炸',logistics:'后勤'};
  return m[t]||t;
}
function shortId(id){return id ? id.slice(0,8)+'…' : '';}

// ── Markdown Renderer (lightweight, XSS-safe) ──
function renderMarkdown(md){
  if(!md) return '';
  const lines = esc(md).split('\n');
  let html='', i=0, inCode=false, codeBuf=[];
  const flushCode=()=>{
    if(!codeBuf.length) return;
    const code=codeBuf.join('\n');
    const langLabel=codeLang?`<span class="code-lang">${esc(codeLang)}</span>`:'';
    html+=`<pre>${langLabel}<button class="copy-btn" onclick="copyCode(this)">复制</button><code>${code}</code></pre>`;
    codeBuf=[];
  };
  while(i<lines.length){
    let line=lines[i];
    if(/^```/.test(line)){if(inCode){flushCode();inCode=false;i++;continue;}inCode=true;codeLang=line.replace(/```/g,'').trim()||'';codeBuf=[];i++;continue;}
    if(inCode){codeBuf.push(line);i++;continue;}
    if(/^### /.test(line)){html+=`<h3>${inline(line.slice(4))}</h3>`;i++;continue;}
    if(/^## /.test(line)){html+=`<h2>${inline(line.slice(3))}</h2>`;i++;continue;}
    if(/^# /.test(line)){html+=`<h2>${inline(line.slice(2))}</h2>`;i++;continue;}
    if(/^&gt; /.test(line)){html+=`<blockquote>${inline(line.slice(5))}</blockquote>`;i++;continue;}
    if(/^(\s*[-*]\s+)/.test(line)){
      let items='';
      while(i<lines.length&&/^(\s*[-*]\s+)/.test(lines[i])){items+=`<li>${inline(lines[i].replace(/^(\s*[-*]\s+)/,''))}</li>`;i++;}
      html+=`<ul>${items}</ul>`;continue;
    }
    if(line.trim()===''){i++;continue;}
    html+=`<p>${inline(line)}</p>`;i++;
  }
  flushCode();
  return html;
}
// ── markdown cache wrapper (perf: skip re-parse of identical input) ──
const _renderMarkdown = renderMarkdown;
renderMarkdown = function(md){
  if(!md) return '';
  if(mdCache.has(md)) return mdCache.get(md);
  const h = _renderMarkdown(md);
  if(mdCache.size > 400) mdCache.clear();
  mdCache.set(md, h);
  return h;
};
function inline(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+?)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function copyCode(btn){
  const code=btn.parentElement.querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='✓';toast('已复制到剪贴板','ok');setTimeout(()=>btn.textContent='复制',1200);});
}
function toast(msg,type){
  const w=$('toast-wrap');if(!w) return;
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');
  t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),320);},2400);
}

// ── Chat ──
const chat=$('chat-messages');
let atBottom=true;
chat.addEventListener('scroll',()=>{
  atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
  const jb=$('scroll-jump');if(jb) jb.style.display = atBottom?'none':'flex';
});
function scrollBottom(){
  if(atBottom) chat.scrollTop=chat.scrollHeight;
}
function formatTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function appendUser(text){
  const el=document.createElement('div');el.className='msg msg-user';
  const ts=formatTime();
  el.innerHTML=`<div class="avatar">我</div><div class="bubble-wrap"><div class="msg-label"><span>我</span><span class="msg-label-meta"><span class="msg-timestamp">${ts}</span><span class="msg-pulse"></span><span class="msg-status"></span></span></div><div class="bubble"></div></div>`;
  el.querySelector('.bubble').textContent=text;
  chat.appendChild(el);
  while(chat.children.length>CHAT_CAP) chat.removeChild(chat.firstChild); // cap DOM growth (perf)
  scrollBottom();return el;
}
function appendAI(loading){
  const el=document.createElement('div');
  el.className='msg msg-ai'+(loading?' thinking':'');
  const ts=formatTime();
  el.innerHTML=`<div class="avatar">🐦</div><div class="bubble-wrap"><div class="msg-label"><span>旗舰 AI</span><span class="msg-label-meta"><span class="msg-timestamp">${ts}</span><span class="msg-pulse"></span></span></div><div class="bubble"></div></div>`;
  const b=el.querySelector('.bubble');
  if(loading){
    b.innerHTML=
      `<div class="skeleton-grid"><div class="skeleton-avatar"></div><div class="skeleton-name"></div></div>`+
      `<div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div>`;
  }
  chat.appendChild(el);
  while(chat.children.length>CHAT_CAP) chat.removeChild(chat.firstChild); // cap DOM growth (perf)
  scrollBottom();return el;
}
function setAIContent(el,md){
  el.classList.remove('thinking');
  const b=el.querySelector('.bubble');b.innerHTML=renderMarkdown(md);
  b.setAttribute('aria-live','polite');b.setAttribute('role','status');
}
function setAIStreaming(el,status){
  el.classList.remove('thinking');
  el.classList.add('streaming');
  // Add run status label
  let r=el.querySelector('.msg-run-status');
  if(!r){
    r=document.createElement('div');r.className='msg-run-status';
    r.innerHTML=`<span class="msg-run-status-dot"></span><span></span>`;
    el.querySelector('.bubble-wrap').appendChild(r);
  }
  r.setAttribute('data-run-status',status||'streaming_text');
  const labels={waiting:'等待中',streaming_text:'生成中…',tool_pending:'工具调用中…',tool_result_preview:'工具执行完毕',interrupted:'已中断',error_recoverable:'遇到错误'};
  r.querySelector('span:last-child').textContent=labels[status]||'生成中…';
  // Pulse dot active
  const p=el.querySelector('.msg-pulse');if(p)p.style.opacity='0.8';
}
function clearAIStreaming(el){
  el.classList.remove('streaming');
  const r=el.querySelector('.msg-run-status');
  if(r)r.remove();
  const p=el.querySelector('.msg-pulse');if(p)p.style.opacity='0.35';
}
function renderExecution(el,ex){
  if(!ex) return;
  const bubble=el.querySelector('.bubble');if(!bubble)return;
  const modeTag=ex.dry_run
    ?'<span class="exec-badge dry">🔶 dry_run 模拟</span>'
    :'<span class="exec-badge live">🔥 LIVE 真实派发</span>';
  const tids=(ex.task_ids||[]).slice(0,3).map(t=>'<code>'+esc(t)+'</code>').join(' ');
  const more=(ex.task_ids||[]).length>3?' …':'';
  const err=ex.error?`<div class="exec-err">⚠️ ${esc(ex.error)}</div>`:'';
  const box=document.createElement('div');box.className='exec-box';
  box.innerHTML=
    `<div class="exec-head">⚙️ 派发执行报告 ${modeTag}</div>`+
    `<div class="exec-row">派发小队 <b>${ex.dispatched}</b> ｜ 成功 <b class="ok">${ex.ok}</b> ｜ 失败 <b class="fail">${ex.failed}</b></div>`+
    `<div class="exec-row">消耗引擎调用 <b>${ex.calls_consumed}</b> ｜ 耗时 ${ex.duration}s</div>`+
    `<div class="exec-row">任务ID：${tids}${more}</div>`+
    err;
  bubble.appendChild(box);
}

// ── Welcome ──
addEventListener('DOMContentLoaded',()=>{
  const w=appendAI(false);
  setAIContent(w,"♪ **旗舰 AI 已就位 · 以歌为翼**\n\n我是闻名银河的天环族歌者。下达自然语言指令，我将以 `同谐` 之力为你解析编队作战计划——自动匹配项目、编队模板与作战条令，推送引擎并行派发。\n\n> 让我们把翅膀借给彼此，试试下面的快捷指令，或直接说出你的需求。");
  const chips=[
    '派航母战斗群修复 CashFlow 的 bug',
    '闪电战，给知更鸟开发新功能',
    '所有项目跑一遍安全检查',
    'AutoAMV 重写导出模块',
    '分析高考系统性能瓶颈',
  ];
  $('suggest-chips').innerHTML=chips.map(c=>`<span class="chip" onclick="send('${c.replace(/'/g,"\\'")}')">${esc(c)}</span>`).join('');
  refreshAll();
});

// ── Stream Render (rAF-throttled) ──
function streamRender(el,getText,status){
  let raf=0;
  return ()=>{
    if(raf) return;
    raf=requestAnimationFrame(()=>{raf=0;
      el.querySelector('.bubble').innerHTML=renderMarkdown(getText())+'<span class="stream-cursor"></span>';
      setAIStreaming(el,status||'streaming_text');
      scrollBottom();
    });
  };
}

// ── Send ──
let sending=false;
// ── Command send / abort / retry / history ──
let abortCtrl=null;
let cmdHistory=[], histIdx=0;
async function send(text, isRetry){
  text=(text||$('chat-input').value).trim();
  if(!text||sending) return;
  if(!isRetry){ cmdHistory.push(text); }
  histIdx=cmdHistory.length;
  // offline → enqueue (resilience)
  if(!isOnline){
    offlineQueue.push(text);
    const ai=appendAI(false);
    setAIContent(ai,'> 📡 离线队列：指令已暂存，恢复连接后自动发送。');
    $('chat-input').value='';autoGrow();
    toast('已离线，指令进入队列','warn');
    return;
  }
  // request notification permission on first real send
  if(notifPerm==='default' && 'Notification' in window){ Notification.requestPermission().then(p=>notifPerm=p).catch(()=>{}); }
  sending=true;
  $('send-btn').style.display='none';
  $('stop-btn').style.display='flex';
  const ue=appendUser(text);
  $('chat-input').value='';autoGrow();
  const ai=appendAI(true);
  ai.dataset.cmd=text;
  let acc='';
  const paint=streamRender(ai,()=>acc,'streaming_text');
  abortCtrl=new AbortController();
  try{
    const r=await fetch(API+'/api/fleet/command/stream',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({command:text}),signal:abortCtrl.signal,
    });
    if(!r.ok||!r.body) throw new Error('stream unavailable ('+r.status+')');
    ai.classList.remove('thinking');
    ai.querySelector('.bubble').innerHTML='';
    const reader=r.body.getReader();
    const dec=new TextDecoder();
    let buf='',gotDone=false;
    while(true){
      const{value,done}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      let idx;
      while((idx=buf.indexOf('\n\n'))!==-1){
        const frame=buf.slice(0,idx);buf=buf.slice(idx+2);
        let ev='message',dl='';
        frame.split('\n').forEach(line=>{
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dl+=line.slice(5).trim();
        });
        if(!dl) continue;
        let d;try{d=JSON.parse(dl);}catch(_){continue;}
        if(ev==='meta'){}
        else if(ev==='delta'){acc+=(d.text||'');paint();}
        else if(ev==='done'){gotDone=true;clearAIStreaming(ai);setAIContent(ai,d.reply||acc);if(d.execution)renderExecution(ai,d.execution);}
      }
    }
    if(!gotDone){clearAIStreaming(ai);setAIContent(ai,acc||'（无回复）');}
  }catch(e){
    if(e.name==='AbortError'){
      clearAIStreaming(ai);
      setAIContent(ai,(acc?acc+'\n\n':'')+'> ⏹ 已停止生成');
      addRetry(ai,text);
    }else{
      clearAIStreaming(ai);
      try{
        const r2=await fetch(API+'/api/fleet/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:text})});
        const d2=await r2.json();
        if(d2.ok){setAIContent(ai,d2.reply||d2.summary||'（无回复）');if(d2.execution)renderExecution(ai,d2.execution);}
        else{setAIContent(ai,'❌ **指令处理失败**\n\n'+(d2.error||'未知错误'));addRetry(ai,text);}
      }catch(e2){
        setAIContent(ai,'❌ **连接失败**\n\n`'+e2.message+'`\n\n请确认舰队 API（端口 19531）已运行。');
        addRetry(ai,text);
      }
    }
  }finally{
    sending=false;abortCtrl=null;
    $('send-btn').style.display='flex';
    $('stop-btn').style.display='none';
    atBottom=true;const jb=$('scroll-jump');if(jb)jb.style.display='none';
    if(ue) ue.classList.add('delivered'); // optimistic delivery confirmed
    scrollBottom();
    if(matchMedia('(pointer:fine)').matches) $('chat-input').focus();
    refreshAll();
  }
}

// ── SSE Event Stream（带断线自动重连） ──
(function connectEvents(){
  let es=null, reconnectTimer=null, retries=0;
  const MAX_BACKOFF=8000;
  function open(){
    es=new EventSource(API+'/api/fleet/events');
    es.addEventListener('ready',()=>{const x=$('ev-live');if(x){x.className='live-dot green';retries=0;}});
    es.addEventListener('event',m=>{try{const ev=JSON.parse(m.data);if(ev&&ev.type) onFleetEvent(ev);}catch(_){}});
    es.addEventListener('ping',()=>{});
    es.onopen=()=>{const x=$('ev-live');if(x){x.className='live-dot green';}
      if(retries>0){retries=0;toast('已恢复实时连接','ok');}};
    es.onerror=()=>{
      const x=$('ev-live');if(x){x.className='live-dot dead';}
      if(es){es.close();es=null;}
      clearTimeout(reconnectTimer);
      const delay=Math.min(MAX_BACKOFF,3000+retries*1500); // 3s→指数退避封顶 8s
      retries++;
      toast('实时连接中断，重连中… ('+Math.round(delay/1000)+'s)','warn');
      reconnectTimer=setTimeout(open,delay);
    };
  }
  open();
})();

// ── Fleet Event Handler ──
function onFleetEvent(ev){
  const d=ev.data||{};
  if(ev.type==='RUN_STARTED'){
    if(!liveTasks.has(d.task_id))
      liveTasks.set(d.task_id,{task_type:d.task_type,status:'submitted',receiver:d.receiver,deps:d.deps||[],ts:ev.ts});
    renderTaskFlow();
  }else if(ev.type==='STATE_DELTA'&&d.kind==='task_status'){
    const t=liveTasks.get(d.task_id)||{task_type:d.task_type,receiver:d.receiver,deps:[]};
    t.status=d.status;t.question=d.question||t.question;t.ts=ev.ts;
    liveTasks.set(d.task_id,t);renderTaskFlow();
  }else if(ev.type==='RUN_FINISHED'||ev.type==='RUN_ERROR'){
    const t=liveTasks.get(d.task_id);if(t){t.status=d.status;t.ts=ev.ts;}
    if(ev.type==='RUN_ERROR') notify('任务执行失败', shortId(d.task_id));
    renderTaskFlow();
  }else if(ev.type==='CUSTOM'&&d.name==='a2a.input_required'){
    const t=liveTasks.get(d.task_id);if(t){t.status='input_required';t.question=d.question;t.ts=ev.ts;}
    renderTaskFlow();
  }
}

// ── Render Task Flow ──
function renderTaskFlow(){
  const arr=[...liveTasks.entries()].sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).slice(0,12);
  const box=$('task-list');
  if(!arr.length){setHTML('task-list','<div class="empty-state">暂无任务流 · 希望有羽毛和翅膀</div>');return;}
  setHTML('task-list',arr.map(([id,t])=>{
    const deps=(t.deps||[]).length?`<span class="dep">← ${t.deps.map(esc).join(', ')}</span>`:'';
    const q=(t.status==='input_required'&&t.question)?`<div class="q">❓ ${esc(t.question)}</div>`:'';
    const live=(Date.now()/1000-(t.ts||0))<20?' live':'';
    return `<div class="task-item${live}"><div class="row">
      <div><span style="font-weight:600;">${esc(t.task_type||'task')}</span>${deps}<div class="id">${shortId(id)}</div></div>
      <div>${statusTag(t.status)}</div></div>${q}</div>`;
  }).join(''));
}

// ── Data Viz: engine-call sparkline (zero-dep inline SVG) ──
function renderSpark(){
  const svg=$('spark-svg'); if(!svg) return;
  const w=100,h=34,pad=2;
  if(sparkBuf.length<2){ svg.innerHTML=''; return; }
  const max=Math.max(...sparkBuf,1), min=Math.min(...sparkBuf,0);
  const range=Math.max(1,(max-min));
  const step=w/(SPARK_MAX-1);
  const pts=sparkBuf.map((v,i)=>{
    const x=pad+i*step;
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const ly=h-pad-((sparkBuf[sparkBuf.length-1]-min)/range)*(h-pad*2);
  const lx=pad+(sparkBuf.length-1)*step;
  svg.innerHTML=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="1.8" fill="var(--cyan)"/>`;
}

function execCmd(i){
  const list=$('cmd-list'); const items=list&&list._items;
  if(!items||!items[i]) return; closeCmd(); items[i].run();
}
function highlightCmd(){
  const list=$('cmd-list'); if(!list) return;

addEventListener('offline',()=>{ isOnline=false; setOffline(true); toast('网络已断开','warn'); });

// ── Initial Load + Polling ──
refreshAll();
setInterval(refreshAll,5000);
</script>
